// SourceMod admin map menu list -- used ONLY by the admin "sm_map" / "sm_votemap"
// commands (basecommands.smx / basevotes.smx). Does NOT affect the in-game player
// "vote for next map" menu, which uses mapcycle.txt (full rotation, workshop maps included).
//
// Keep this to a SMALL list of base-game maps. Do NOT add workshop maps and do NOT
// leave it empty:
//   - Empty/missing -> SourceMod falls back to the full mapcyclefile (mostly workshop maps).
//   - Workshop (or wrong-case) names -> validating them at startup makes the native-Linux
//     engine do a recursive case-insensitive filesystem search across all mounted workshop
//     search paths, which trips the engine watchdog and crash-loops the server.
// Either way the server crash-loops on startup. See memory note
// "insurgency-native-workshop-mapmenu-crash". Admins can still "sm_map <name>" any map.
embassy_coop
